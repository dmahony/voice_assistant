<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline Voice Assistant</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .hands-free-toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.9rem;
        color: var(--muted);
    }
    input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
    }
    .nav-links {
        display: flex;
        gap: 12px;
    }
    .nav-links a {
        color: var(--muted);
        text-decoration: none;
        font-size: 0.85rem;
    }
    .nav-links a:hover {
        color: var(--accent);
    }
    .visualizer {
        height: 4px;
        background: var(--panel-2);
        border-radius: 2px;
        overflow: hidden;
        margin-top: 8px;
    }
    #volume-bar {
        height: 100%;
        width: 0%;
        background: var(--accent-2);
        transition: width 0.1s ease;
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>Offline Voice Assistant</h1>
        <div class="nav-links">
            <a href="/settings">Settings</a>
            <a href="/debug">Debug</a>
        </div>
      </div>
      <div class="status-pill" id="status-pill">idle</div>
    </header>

    <section class="controls">
      <button id="start-btn" class="primary">Start recording</button>
      <button id="stop-btn" disabled>Stop</button>
      <button id="clear-btn" class="ghost">Clear chat</button>
      
      <div class="hands-free-toggle">
        <input type="checkbox" id="hands-free-mode">
        <label for="hands-free-mode">Hands-free / VAD</label>
      </div>
      
      <div id="vad-indicator" style="display:none; width: 100%;">
          <div class="visualizer"><div id="volume-bar"></div></div>
      </div>
    </section>

    <section class="status-line">
      <strong>Status:</strong> <span id="status-text">Ready.</span>
    </section>

    <section class="chat" id="chat"></section>

    <section class="debug-panel">
      <label for="audio-player">Audio playback</label>
      <audio id="audio-player" controls></audio>
    </section>
  </main>

  <script src="/static/app.js" defer></script>
</body>
</html>
