<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline Voice Assistant</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>Offline Voice Assistant</h1>
        <p>Browser mic → local STT → local llama-server → local TTS</p>
      </div>
      <div class="status-pill" id="status-pill">idle</div>
    </header>

    <section class="controls">
      <button id="start-btn" class="primary">Start recording</button>
      <button id="stop-btn" disabled>Stop</button>
      <button id="clear-btn" class="ghost">Clear chat</button>
    </section>

    <section class="voice-panel">
      <div class="voice-panel-head">
        <div>
          <h2>Voice clone</h2>
          <p>Record a sample, name it, and save it as a selectable XTTS speaker profile.</p>
        </div>
      </div>

      <div class="voice-form">
        <input id="voice-name" type="text" maxlength="64" placeholder="Voice name" />
        <button id="voice-start-btn" class="primary">Record sample</button>
        <button id="voice-stop-btn" disabled>Stop & save</button>
      </div>

      <div class="voice-note">
        Use a clean 10–30 second recording. Saved voices are converted to 24 kHz mono WAV for XTTS.
      </div>

      <div id="voice-list" class="voice-list"></div>
    </section>

    <section class="status-line">
      <strong>Status:</strong> <span id="status-text">Ready.</span>
    </section>

    <section class="chat" id="chat"></section>

    <section class="debug-panel">
      <label for="audio-player">Audio playback</label>
      <audio id="audio-player" controls></audio>
    </section>
  </main>

  <script src="/static/app.js" defer></script>
</body>
</html>
